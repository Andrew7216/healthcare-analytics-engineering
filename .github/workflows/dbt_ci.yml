name: dbt CI

on:
  push:
    branches:
      - master

  pull_request:
    branches:
      - master

jobs:
  dbt-ci:
    runs-on: ubuntu-latest

    env:
      DBT_SNOWFLAKE_ACCOUNT: ${{ secrets.DBT_SNOWFLAKE_ACCOUNT }}
      DBT_SNOWFLAKE_USER: ${{ secrets.DBT_SNOWFLAKE_USER }}
      DBT_SNOWFLAKE_PRIVATE_KEY: ${{ secrets.DBT_SNOWFLAKE_PRIVATE_KEY }}
      DBT_SNOWFLAKE_ROLE: ${{ secrets.DBT_SNOWFLAKE_ROLE }}
      DBT_SNOWFLAKE_DATABASE: ${{ secrets.DBT_SNOWFLAKE_DATABASE }}
      DBT_SNOWFLAKE_WAREHOUSE: ${{ secrets.DBT_SNOWFLAKE_WAREHOUSE }}
      DBT_SNOWFLAKE_SCHEMA: ${{ secrets.DBT_SNOWFLAKE_SCHEMA }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dbt
        run: |
          python -m pip install --upgrade pip
          pip install dbt-core==1.11.6 dbt-snowflake==1.11.5

      - name: Create dbt profile
        run: |
          mkdir -p ~/.dbt

          printf '%s' "$DBT_SNOWFLAKE_PRIVATE_KEY" > ~/.dbt/rsa_key.p8
          chmod 600 ~/.dbt/rsa_key.p8

          cat > ~/.dbt/profiles.yml <<EOF
          ae_bootcamp:
            target: ci
            outputs:
              ci:
                type: snowflake
                account: "$DBT_SNOWFLAKE_ACCOUNT"
                user: "$DBT_SNOWFLAKE_USER"
                private_key_path: "/home/runner/.dbt/rsa_key.p8"
                role: "$DBT_SNOWFLAKE_ROLE"
                database: "$DBT_SNOWFLAKE_DATABASE"
                warehouse: "$DBT_SNOWFLAKE_WAREHOUSE"
                schema: "$DBT_SNOWFLAKE_SCHEMA"
                threads: 4
                client_session_keep_alive: false
          EOF

      - name: Test Snowflake connection
        run: dbt debug --target ci

      - name: Install dbt packages
        run: dbt deps

      - name: Parse dbt project
        run: dbt parse --target ci

      - name: Run dbt build
        run: dbt build --target ci